services:

  mariadb:
    image: mariadb:11
    container_name: tycoon-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE:      db
      MARIADB_USER:          user
      MARIADB_PASSWORD:      password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - tycoon-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  tomcat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tycoon-app
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_NAME: db
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - tycoon-net

volumes:
  db_data:

networks:
  tycoon-net:
    driver: bridge
